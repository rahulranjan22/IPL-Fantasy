services:
  - type: web
    name: ipl-fantasy-api
    runtime: python
    region: singapore   # closest to India
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false        # paste from Supabase dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://ipl-fantasy.vercel.app,http://localhost:3000
      - key: CRICAPI_KEY
        sync: false        # optional — from cricapi.com
    healthCheckPath: /api/health
